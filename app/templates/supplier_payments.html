{% extends "base.html" %}
{% load static %}

{% block content %}

<section class="payments-coming-soon">
    <div class="container">

        <div class="coming-card">

            <!-- Animation -->
            <div class="animation-wrap">
                <lottie-player
                    src="https://assets9.lottiefiles.com/packages/lf20_jtbfg2nb.json"
                    background="transparent"
                    speed="1"
                    class="coming-animation"
                    loop
                    autoplay>
                </lottie-player>
            </div>

            <h1>Supplier Payments Module</h1>
            <span class="badge">Coming Soon</span>

            <p class="subtitle">
                This feature is currently under development.
                For supplier payments, confirmations, or inquiries,
                please reach out to our team directly on WhatsApp.
            </p>

            <div class="contacts-grid">

                <!-- DMK -->
                <a href="https://wa.me/254790644050?text=Hello%20DMK,%20I%20want%20to%20make%20a%20supplier%20payment%20request"
                   target="_blank"
                   rel="noopener"
                   class="contact-card">
                    <i class="fa-brands fa-whatsapp wa-icon"></i>
                    <span class="contact-name">DMK</span>
                </a>

                <!-- Joyce -->
                <a href="https://wa.me/254717199367?text=Hello%20Joyce,%20I%20have%20an%20inquiry%20about%20supplier%20payments"
                   target="_blank"
                   rel="noopener"
                   class="contact-card">
                    <i class="fa-brands fa-whatsapp wa-icon"></i>
                    <span class="contact-name">Joy</span>
                </a>

            </div>

        </div>
    </div>
</section>

<style>
.payments-coming-soon {
    min-height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    background: #f8fafc;
}

.coming-card {
    background: #fff;
    width: 100%;
    max-width: 680px;
    border-radius: 28px;
    padding: 52px 44px 48px;
    box-shadow: 0 20px 60px rgba(15, 23, 42, 0.10);
    text-align: center;
    border: 1px solid #e2e8f0;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* ── Animation ── */
.animation-wrap {
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
    margin-bottom: 8px;
}

.coming-animation {
    width: 210px;
    height: 210px;
    display: block;
    margin: 0 auto;
}

/* ── Heading ── */
.coming-card h1 {
    margin: 14px 0 10px;
    font-size: 1.85rem;
    font-weight: 800;
    color: #0f172a;
    line-height: 1.25;
}

/* ── Badge ── */
.badge {
    display: inline-block;
    background: #fef3c7;
    color: #92400e;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 4px 14px;
    border-radius: 999px;
    border: 1px solid #fde68a;
    margin-bottom: 20px;
}

/* ── Subtitle ── */
.subtitle {
    color: #64748b;
    max-width: 500px;
    margin: 0 auto 36px;
    line-height: 1.75;
    font-size: 0.97rem;
}

/* ── Buttons grid ── */
.contacts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    width: 100%;
    max-width: 400px;
    margin: 0 auto;
}

.contact-card {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 15px 20px;
    border-radius: 14px;
    text-decoration: none;
    background: #25D366;
    color: #fff;
    font-weight: 700;
    font-size: 1rem;
    border: none;
    transition: background 0.22s ease, transform 0.22s ease, box-shadow 0.22s ease;
    box-shadow: 0 4px 14px rgba(37, 211, 102, 0.28);
}

.contact-card:hover {
    background: #1da851;
    transform: translateY(-3px);
    box-shadow: 0 8px 22px rgba(37, 211, 102, 0.38);
    color: #fff;
}

.wa-icon {
    font-size: 1.35rem;
    flex-shrink: 0;
}

.contact-name {
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.01em;
}

/* ── Responsive ── */
@media (max-width: 768px) {
    .coming-card {
        padding: 36px 22px 38px;
    }

    .coming-card h1 {
        font-size: 1.45rem;
    }

    .coming-animation {
        width: 170px;
        height: 170px;
    }

    .contacts-grid {
        grid-template-columns: 1fr 1fr;
        max-width: 100%;
    }
}

@media (max-width: 400px) {
    .contacts-grid {
        grid-template-columns: 1fr;
    }
}
</style>

{% endblock %}

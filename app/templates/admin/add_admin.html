{% extends "dashboard/dashboard_base.html" %}

{% block content %}
<div class="auth-card">
    <h2>Add Admin</h2>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn-primary">
            Add Admin
        </button>
    </form>
</div>

<style>
.auth-card {
    max-width: 520px;
    margin: 40px auto;
    background: #ffffff;
    padding: 28px;
    border-radius: 14px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    border: 1px solid #e2e8f0;
}

.auth-card h2 {
    margin-bottom: 18px;
    font-size: 20px;
    color: #0f172a;
    font-weight: 700;
}

.auth-card form p {
    margin-bottom: 14px;
}

.auth-card input,
.auth-card select,
.auth-card textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    transition: 0.2s;
}

.auth-card input:focus,
.auth-card select:focus,
.auth-card textarea:focus {
    border-color: #111e38;
    box-shadow: 0 0 0 3px rgba(17,30,56,0.1);
}

.btn-primary {
    background: #111e38;
    color: white;
    border: none;
    padding: 12px 18px;
    border-radius: 10px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
}

.btn-primary:hover {
    background: #0b1224;
}
</style>
{% endblock %}
